name: checks

on:
  push:
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Python syntax check
        run: python -m py_compile scripts/*.py
      - name: Validate committed outputs
        run: python scripts/08_validate_outputs.py
